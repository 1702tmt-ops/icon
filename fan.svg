<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64"
     height="64">

    <!-- Vòng ngoài -->
    <circle
        cx="32"
        cy="32"
        r="28"
        fill="none"
        stroke="currentColor"
        stroke-width="2"/>

    <!-- Cánh quạt -->
    <g>

        <!-- Cánh 1 -->
        <path
            fill="currentColor"
            d="M32 32
               C30 16 41 8 49 12
               C55 15 52 27 38 32
               Z"/>

        <!-- Cánh 2 -->
        <path
            fill="currentColor"
            transform="rotate(120 32 32)"
            d="M32 32
               C30 16 41 8 49 12
               C55 15 52 27 38 32
               Z"/>

        <!-- Cánh 3 -->
        <path
            fill="currentColor"
            transform="rotate(240 32 32)"
            d="M32 32
               C30 16 41 8 49 12
               C55 15 52 27 38 32
               Z"/>

        <!-- Tâm quạt -->
        <circle
            cx="32"
            cy="32"
            r="4"
            fill="currentColor"/>

    </g>

</svg>