<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
    margin:0;
    background:transparent;
    overflow:hidden;
}

canvas{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=300;
    canvas.height=300;
}
resize();

const particles=[];

function createParticle(){

    const angle=(-75+Math.random()*150)*Math.PI/180;

    const speed=2+Math.random()*3;

    particles.push({

        x:150,

        y:60,

        vx:Math.sin(angle)*speed,

        vy:Math.cos(angle)*speed,

        life:40+Math.random()*30,

        size:1+Math.random()*2,

        alpha:1

    });

}

function update(){

    requestAnimationFrame(update);

    ctx.clearRect(0,0,300,300);

    // ống
    ctx.strokeStyle="black";
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(150,0);
    ctx.lineTo(150,40);
    ctx.stroke();

    // béc
    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(150,50,6,0,Math.PI*2);
    ctx.fill();

    // mỗi frame sinh ngẫu nhiên 10-20 hạt
    const amount=10+Math.floor(Math.random()*11);

    for(let i=0;i<amount;i++){

        createParticle();

    }

    for(let i=particles.length-1;i>=0;i--){

        let p=particles[i];

        p.x+=p.vx;

        p.y+=p.vy;

        p.life--;

        p.alpha=p.life/70;

        ctx.globalAlpha=p.alpha;

        ctx.fillStyle="black";

        ctx.beginPath();

        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

        ctx.fill();

        if(p.life<=0){

            particles.splice(i,1);

        }

    }

    ctx.globalAlpha=1;

}

update();

</script>

</body>
</html>
