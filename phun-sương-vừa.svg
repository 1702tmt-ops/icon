<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 200">

  <!-- Ống -->
  <line x1="100" y1="10"
        x2="100" y2="40"
        stroke="currentColor"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Đầu béc -->
  <circle cx="100"
          cy="50"
          r="5"
          fill="currentColor"/>

