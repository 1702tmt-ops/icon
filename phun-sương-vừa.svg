    <animate attributeName="opacity"
             values="1;0"
             dur="1.0s"
             begin="0.15s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Hạt 3 -->
  <circle cx="100" cy="55" r="2" fill="currentColor">
    <animateMotion dur="1.1s"
                   begin="0.3s"
                   repeatCount="indefinite"
                   path="M0,0 L-20,110"/>
    <animate attributeName="opacity"
             values="1;0"
