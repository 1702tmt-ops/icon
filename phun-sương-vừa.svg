                   repeatCount="indefinite"
                   path="M0,0 L20,110"/>
    <animate attributeName="opacity"
             values="1;0"
             dur="1.0s"
             begin="0.2s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Hạt 6 -->
  <circle cx="100" cy="55" r="1.6" fill="currentColor">
    <animateMotion dur="1.15s"
                   begin="0.55s"
                   repeatCount="indefinite"
                   path="M0,0 L40,105"/>
    <animate attributeName="opacity"
