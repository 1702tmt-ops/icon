  <circle cx="100" cy="55" r="1.8" fill="currentColor">
    <animateMotion dur="1.2s"
                   begin="0s"
                   repeatCount="indefinite"
                   path="M0,0 L-55,95"/>
    <animate attributeName="opacity"
             values="1;0"
             dur="1.2s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Hạt 2 -->
  <circle cx="100" cy="55" r="1.5" fill="currentColor">
