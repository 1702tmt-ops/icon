<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
body{margin:0;font-family:Arial;padding:20px}.row{display:flex;align-items:center;margin:10px 0}.label{width:90px;color:#666}.box{flex:1;background:#eef3f8;height:26px;border-radius:13px;overflow:hidden;position:relative}.bar{height:100%;width:0;background:#67c6ff;transition:width 1s}.max{background:#0b84ff}.val{position:absolute;right:8px;top:4px;color:#fff;font-size:12px;font-weight:bold}.axis{display:flex;justify-content:space-between;margin-left:90px;color:#777;font-size:12px}
</style></head><body><div id='chart'></div><div class='axis'><span>0</span><span>500</span><span>1000</span><span>1500</span><span>2000</span></div><script>
function updateChart(data){const c=document.getElementById('chart');c.innerHTML='';const m=Math.max(...data.map(x=>x.value));data.forEach(d=>{let r=document.createElement('div');r.className='row';let l=document.createElement('div');l.className='label';l.textContent=d.label;let box=document.createElement('div');box.className='box';let b=document.createElement('div');b.className='bar'+(d.value===m?' max':'');let v=document.createElement('div');v.className='val';v.textContent=d.value;b.appendChild(v);box.appendChild(b);r.append(l,box);c.appendChild(r);requestAnimationFrame(()=>b.style.width=(d.value/m*100)+'%');});}
updateChart([{label:'Sun-14.06',value:158.4},{label:'Mon-15.06',value:627.2},{label:'Tue-16.06',value:1993},{label:'Wed-17.06',value:1899.3},{label:'Thu-18.06',value:1394.1},{label:'Fri-19.06',value:1578.6}]);
</script></body></html>
