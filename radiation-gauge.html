<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
html,body{margin:0;background:transparent;overflow:hidden;font-family:Arial}svg{width:100vw;height:100vh}#value{font-size:46px;font-weight:bold;fill:#222}#unit{font-size:18px;fill:#666}
</style></head><body><svg viewBox="0 0 400 250">
<path d="M50 200 A150 150 0 0 1 125 70" fill="none" stroke="#35c759" stroke-width="16"/>
<path d="M125 70 A150 150 0 0 1 275 70" fill="none" stroke="#f5c542" stroke-width="16"/>
<path d="M275 70 A150 150 0 0 1 350 200" fill="none" stroke="#ff3b30" stroke-width="16"/>
<g id="ticks"></g><g id="needle"><line x1="200" y1="200" x2="200" y2="75" stroke="#d00" stroke-width="4"/><circle cx="200" cy="200" r="8" fill="#333"/></g>
<text id="value" x="200" y="165" text-anchor="middle">0</text><text id="unit" x="200" y="190" text-anchor="middle">W/m²</text></svg>
<script>
const t=document.getElementById('ticks');
for(let i=0;i<=60;i++){let a=(0+i*3)*Math.PI/90,r1=132,r2=i%5?124:118,x1=200+r1*Math.cos(a),y1=200+r1*Math.sin(a),x2=200+r2*Math.cos(a),y2=200+r2*Math.sin(a);let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('stroke','#555');l.setAttribute('stroke-width',i%5?1:2);t.appendChild(l);}
let radiationValue=650,current=0,maxValue=1200;
function loop(){current+=(radiationValue-current)*0.08;let ang=0+current/maxValue*180;document.getElementById('needle').setAttribute('transform','rotate('+ang+' 200 200)');document.getElementById('value').textContent=Math.round(current);requestAnimationFrame(loop);}
loop();
setInterval(()=>radiationValue=Math.random()*1200,3000);
</script></body></html>
